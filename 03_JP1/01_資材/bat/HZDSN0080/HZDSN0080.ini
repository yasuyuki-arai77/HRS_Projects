; エンコード/改行: UTF-8（BOMなし）/ CRLF
; このジョブ固有設定。REMOTE_CLEANを明示してください（OFF/ALL/PATTERN）
; HZDSN0080.ini
; 役割:
;   HZDSN0080 の SFTP 送信ジョブ用・ジョブ固有設定。
; 参照:
;   - 共通バッチ      : exec\bin\common\run_winscp.bat
;   - WinSCPスクリプト: exec\bin\common\sftp_run_winscp.txt
;   - 共通INI         : exec\bin\common\common.ini（DEST_*/HOSTKEY/SSH_KEY/WINSCP_EXE 等を集中管理）
; 読み込み順:
;   共通INI → 本INI（後勝ち。本INIに書いた値が優先される）
; 本INIで定義するキー:
;   SRC_DIR, FILE_PATTERN, DEST_DIR, BACKUP_DIR, ERR_DIR（＝ジョブ固有）
; 記法:
;   値に引用符は付けない（スペースを含むパスでもそのまま記載してOK）
; ログ:
;   exec\log\HZDSN0080\HZDSN0080_yyyyMMdd_HHmmss_{out|err}.log（出力は共通バッチ側）
;   ANSI(cp932)（BOMなし）で保存すること（キー読取での化け防止）


; --- 転送元（ローカル。送信元フォルダ） ---
SRC_DIR=D:\Snowflake\IoT\Send\品質記録_ヘッダ_LOG

; --- ファイルパターン ---
FILE_PATTERN=*.csv

; --- 転送先（リモート。アップロード先ディレクトリ） ---
DEST_DIR=/dataspider/IoT/Recv/品質記録_ヘッダ_LOG

; --- 転送成功バックアップ（ローカル退避先） ---
BACKUP_DIR=D:\Snowflake\IoT\Send\品質記録_ヘッダ_LOG\bak

; --- 転送失敗バックアップ（ローカル回収先） ---
ERR_DIR=D:\Snowflake\IoT\Send\品質記録_ヘッダ_LOG\error

; （必要に応じて、このジョブだけ共通設定を上書きする例）
; DEST_USER=別ユーザー
; SSH_KEY=D:\Snowflake\IoT\keys\別鍵.ppk
; HOSTKEY=アルゴリズム 指紋...

; ===== Azure 事前削除オプション（新仕様） =====
; REMOTE_CLEAN : OFF(既定)/ALL/PATTERN
;   - OFF     : 削除せず上書きPUT（積み上げ運用）
;   - ALL     : DEST_DIR の全ファイルを削除してからPUT（マスタ等）
;   - PATTERN : REMOTE_CLEAN_MASK に一致するもののみ削除してからPUT（例外トラン等）
; REMOTE_CLEAN_MASK : PATTERN 指定時の削除対象。省略時は FILE_PATTERN を使用
REMOTE_CLEAN=PATTERN
REMOTE_CLEAN_MASK=*.csv
