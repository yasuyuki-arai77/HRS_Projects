; HZDSN0090.ini
; 役割:
;   HZDSN0090 の SFTP 送信ジョブ用・ジョブ固有設定。
; 参照:
;   - 共通バッチ      : exec\bin\common\run_winscp.bat
;   - WinSCPスクリプト: exec\bin\common\sftp_run_winscp.txt
;   - 共通INI         : exec\bin\common\common.ini（DEST_*/HOSTKEY/SSH_KEY/WINSCP_EXE 等を集中管理）
; 読み込み順:
;   共通INI → 本INI（後勝ち。本INIに書いた値が優先される）
; 本INIで定義するキー:
;   SRC_DIR, FILE_PATTERN, DEST_DIR, BACKUP_DIR, ERR_DIR（＝ジョブ固有）
; 記法:
;   値に引用符は付けない（スペースを含むパスでもそのまま記載してOK）
; ログ:
;   exec\log\HZDSN0090\HZDSN0090_yyyyMMdd_HHmmss_{out|err}.log（出力は共通バッチ側）
;   UTF-8（BOMなし）で保存すること（キー読取での化け防止）


; --- 転送元（ローカル。送信元フォルダ） ---
SRC_DIR=D:\Snowflake\IoT\Send\品質記録_不良数_LOG

; --- ファイルパターン ---
FILE_PATTERN=*.csv

; --- 転送先（リモート。アップロード先ディレクトリ） ---
DEST_DIR=/dataspider/IoT/Recv/品質記録_不良数_LOG

; --- 転送成功バックアップ（ローカル退避先） ---
BACKUP_DIR=D:\Snowflake\IoT\Send\品質記録_不良数_LOG\bak

; --- 転送失敗バックアップ（ローカル回収先） ---
ERR_DIR=D:\Snowflake\IoT\Send\品質記録_不良数_LOG\err

; （必要に応じて、このジョブだけ共通設定を上書きする例）
; DEST_USER=別ユーザー
; SSH_KEY=D:\Snowflake\IoT\keys\別鍵.ppk
; HOSTKEY=アルゴリズム 指紋...

