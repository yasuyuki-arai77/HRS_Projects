; common.ini
; 役割:
;   全ジョブ共通の既定値を定義するファイル。ジョブ側 INI（HZDSN@@@@.ini）で
;   同じキーを書けば「後勝ち」で上書きされます。
; 参照:
;   - 共通バッチ      : exec\bin\common\run_winscp.bat
;   - WinSCPスクリプト: exec\bin\common\sftp_run_winscp.txt
; 読み込み順:
;   本ファイル（common.ini） → ジョブINI（後勝ち）
; 記法:
;   値は原則「引用符なし」で記載してください。
;   例外として WINSCP_EXE は「引用有り/無しどちらでも可」（空白含むパスに対応）。
; セキュリティ:
;   SSH_KEY（秘密鍵ファイル）は JP1 実行ユーザー＋管理者のみ読取可能にしてください。
;   HOSTKEY は接続先再構築時に更新が必要です（疎通確認の上で差し替え）。
; エンコードは「UTF-8（BOMなし）」で保存


; --- WinSCP（実行ファイルパスを共通化） ---
; 未設定なら PATH から winscp.com を採用
WINSCP_EXE=D:\opt\WinSCP-Portable\WinSCP.com

; --- 接続先（共通） ---
DEST_HOST=10.250.3.4
DEST_PORT=22
DEST_USER=hrssnowflakedatafiles01.snowsftp01
HOSTKEY=ecdsa-sha2-nistp256 256 hNki347+AC3wa6Yp1qgRfxFQGku65fd3VM13B675RCA=

; --- 認証（秘密鍵の共通パス） ---
SSH_KEY=C:\Users\hirose\.ssh\snowsftpkey01.ppk